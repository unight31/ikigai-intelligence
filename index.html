<title>Ikigai Intelligence</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:       #0B0C10;
    --surface:  #111318;
    --card:     #161820;
    --border:   #1F2230;
    --borderHi: #2E3248;
    --ink:      #E8E6F0;
    --inkMid:   #7B7F96;
    --inkDim:   #3A3D50;
    --blue:     #4A7CDB;
    --blueDim:  #253660;
    --gold:     #C8A84A;
    --goldDim:  #5C4C22;
    --red:      #C84A4A;
    --green:    #4AC87A;
  }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
  }
  #app {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
  }
  /* TOPBAR */
  #topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 22px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  .logo-main { font-size: 17px; font-weight: 800; letter-spacing: .08em; color: var(--blue); }
  .logo-sub  { font-size: 17px; font-weight: 200; letter-spacing: .15em; color: var(--inkDim); margin-left: 6px; }
  .avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--blueDim); border: 1px solid rgba(74,124,219,.27);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: var(--blue); font-weight: 800;
  }
  /* MAIN */
  #main { flex: 1; overflow-y: auto; padding-bottom: 68px; }
  /* BOTTOM NAV */
  #bottomnav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    background: var(--surface); border-top: 1px solid var(--border);
    display: flex; z-index: 10;
  }
  .nav-btn {
    flex: 1; background: none; border: none; cursor: pointer;
    padding: 12px 0 16px; display: flex; flex-direction: column;
    align-items: center; gap: 4px;
  }
  .nav-btn .nav-icon { font-size: 18px; transition: color .2s; }
  .nav-btn .nav-label { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; font-weight: 400; transition: color .2s; }
  .nav-btn.active .nav-icon,
  .nav-btn.active .nav-label { color: var(--blue); font-weight: 700; }
  .nav-btn:not(.active) .nav-icon,
  .nav-btn:not(.active) .nav-label { color: var(--inkDim); }

  /* CARDS & UTILS */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px;
  }
  .pill {
    display: inline-block; font-size: 10px; font-weight: 700;
    letter-spacing: .12em; text-transform: uppercase;
    padding: 3px 9px; border-radius: 4px;
  }
  .section-title {
    font-size: 11px; letter-spacing: .18em; text-transform: uppercase;
    font-weight: 600; color: var(--inkDim); margin-bottom: 14px;
  }
  .btn {
    border: none; border-radius: 10px; cursor: pointer;
    font-weight: 700; font-size: 13px; transition: opacity .2s;
  }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  input[type=text], input[type=number], input[type=date] {
    background: var(--card); border: 1px solid var(--borderHi);
    border-radius: 10px; padding: 12px 14px; color: var(--ink);
    font-size: 14px; outline: none; width: 100%; font-family: inherit;
  }
  .back-btn {
    background: none; border: none; cursor: pointer;
    color: var(--inkMid); font-size: 18px; padding: 0; line-height: 1;
  }

  /* SCREENS */
  .screen { display: none; }
  .screen.active { display: block; }

  /* HOME */
  .hero {
    padding: 44px 28px 36px; text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .hero-eyebrow { font-size: 11px; letter-spacing: .3em; color: var(--inkDim); text-transform: uppercase; margin-bottom: 20px; font-weight: 600; }
  .hero-title { font-size: 30px; font-weight: 800; letter-spacing: -.01em; color: var(--ink); line-height: 1.15; }
  .hero-title span { color: var(--blue); }
  .hero-sub { font-size: 14px; color: var(--inkMid); line-height: 1.6; margin-top: 16px; }
  .domains-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 28px 20px 0; }
  .domain-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 20px 16px; cursor: pointer;
    text-align: left; transition: all .2s; position: relative; overflow: hidden;
  }
  .domain-icon { font-size: 22px; margin-bottom: 10px; line-height: 1; }
  .domain-name { font-size: 14px; font-weight: 700; color: var(--ink); margin-bottom: 2px; }
  .domain-sub  { font-size: 11px; color: var(--inkMid); }
  .domain-arrow { position: absolute; bottom: 12px; right: 14px; font-size: 11px; font-weight: 700; opacity: .5; }

  /* DOMAIN SCREEN */
  .domain-header { padding: 20px 22px 0; border-bottom: 1px solid var(--border); }
  .domain-header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
  .tabs { display: flex; overflow-x: auto; }
  .tab-btn {
    background: none; border: none; border-bottom: 2px solid transparent;
    padding: 10px 14px; cursor: pointer; font-size: 12px; color: var(--inkMid);
    white-space: nowrap; transition: all .2s; font-family: inherit;
  }
  .tab-btn.active { font-weight: 700; }
  .tab-content { padding: 24px 22px 32px; }

  /* CONCEPT CARD */
  .concept-box {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 22px 20px; min-height: 160px;
    line-height: 1.75; font-size: 14px; color: var(--ink);
    white-space: pre-wrap;
  }
  .refresh-btn {
    margin-top: 14px; width: 100%; padding: 13px;
    border-radius: 10px; border: 1px solid; font-size: 13px;
    font-weight: 600; cursor: pointer; letter-spacing: .04em;
    background: transparent; font-family: inherit;
  }

  /* BOOKS */
  .book-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 10px; }
  .book-title  { font-size: 14px; font-weight: 700; color: var(--ink); margin-bottom: 3px; }
  .book-author { font-size: 11px; color: var(--inkMid); }
  .book-why    { font-size: 13px; color: var(--inkMid); line-height: 1.6; padding-top: 8px; border-top: 1px solid var(--border); margin-top: 8px; }

  /* READING PLANNER */
  .planner-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .plan-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 12px; cursor: pointer; transition: border-color .2s; }
  .progress-bar-wrap { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; margin: 10px 0; }
  .progress-bar { height: 100%; border-radius: 3px; transition: width .6s; }
  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
  .kpi-box { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 6px; text-align: center; }
  .kpi-val   { font-size: 16px; font-weight: 800; margin-bottom: 4px; }
  .kpi-label { font-size: 9px; color: var(--inkMid); }
  .method-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; cursor: pointer; transition: all .2s; }
  .method-card.selected { background: rgba(74,124,219,.1); border-color: rgba(74,124,219,.4); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-day-label { text-align: center; font-size: 10px; color: var(--inkDim); padding-bottom: 6px; font-weight: 600; }
  .cal-cell { aspect-ratio: 1; border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-direction: column; font-size: 10px; }
  .cal-cell.today { border: 2px solid var(--blue); }
  .cal-cell.today-review { border: 2px solid var(--gold); }
  .today-target-box { border-radius: 12px; padding: 16px 18px; margin-bottom: 20px; }
  .log-section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 20px; }
  .timer-box { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 20px; }
  .timer-display { font-size: 38px; font-weight: 800; letter-spacing: .08em; text-align: center; font-variant-numeric: tabular-nums; color: var(--ink); margin: 12px 0; }
  .timer-btns { display: flex; gap: 8px; }
  .timer-btn { flex: 1; padding: 10px; border-radius: 8px; border: none; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; transition: opacity .2s; }

  /* MUSCU */
  .muscu-day-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; margin-bottom: 10px; cursor: pointer; transition: border-color .2s; }
  .muscu-day-card.rest { cursor: default; opacity: .55; }
  .muscu-day-card.is-today { border-color: var(--borderHi); }
  .muscu-day-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .muscu-day-label { font-size: 10px; color: var(--inkMid); text-transform: uppercase; letter-spacing: .1em; font-weight: 600; margin-bottom: 3px; }
  .muscu-day-name { font-size: 15px; font-weight: 800; }
  .muscu-day-sub { font-size: 12px; color: var(--inkMid); margin-top: 6px; }
  .muscu-cardio-badge { display: inline-block; margin-top: 8px; font-size: 11px; color: var(--blue); background: var(--blueDim); padding: 4px 9px; border-radius: 6px; }
  .exercise-row { display: flex; align-items: center; gap: 12px; padding: 12px 4px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .exercise-row:last-child { border-bottom: none; }
  .exercise-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--borderHi); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #fff; font-weight: 800; transition: all .2s; }
  .exercise-name { font-size: 13px; font-weight: 600; color: var(--ink); }
  .exercise-detail { font-size: 11px; color: var(--inkMid); margin-top: 2px; }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div>
      <span class="logo-main">IKIGAI</span>

<script>
// ── DATA ──────────────────────────────────────────────────
const C = {
  bg:'#0B0C10',surface:'#111318',card:'#161820',border:'#1F2230',
  borderHi:'#2E3248',ink:'#E8E6F0',inkMid:'#7B7F96',inkDim:'#3A3D50',
  blue:'#4A7CDB',blueDim:'#253660',gold:'#C8A84A',goldDim:'#5C4C22',
  red:'#C84A4A',green:'#4AC87A'
};

const DOMAINS = [
  { id:'psycho',   label:'Psychologie', sub:'& Influence',    icon:'◉', color:'#7C5CBF' },
  { id:'finance',  label:'Finance',     sub:'& Économie',     icon:'◈', color:'#C8A84A' },
  { id:'leader',   label:'Leadership',  sub:'& Autorité',     icon:'△', color:'#4A7CDB' },

  { id:'sciences', label:'Sciences',    sub:'& Technologie',  icon:'⬡', color:'#4AC87A' },
];

const BOOKS = {
  psycho:[
    {title:'Influence',author:'Robert Cialdini',why:'Les 6 mécanismes d\'influence que tout le monde utilise sur toi — sans que tu le saches.'},

    {title:'Les 48 lois du pouvoir',author:'Robert Greene',why:'Manuel non censuré des dynamiques de pouvoir social. À lire avec recul critique.'},
    {title:'La psychologie des foules',author:'Gustave Le Bon',why:'Comprendre pourquoi les groupes perdent leur jugement individuel.'},

// Concepts pré-rédigés, 3 par domaine, rotation aléatoire
const CONCEPTS = {
  psycho:[
    `Le biais de confirmation n'est pas une faiblesse — c'est ton cerveau qui optimise sa survie.\n\nTon cerveau traite 11 millions de bits par seconde, mais n'en est conscient que de 40. Pour gérer ce flux, il filtre : il retient ce qui confirme ce qu'il croit déjà. Résultat : un policier convaincu de la culpabilité d'un suspect verra dans chaque détail la preuve de sa thèse, même les preuves contraires.\n\nApplication cette semaine : prends une conviction forte que tu as — sur l'argent, les gens, ton avenir. Passe 10 minutes à chercher activement des preuves qu'elle est fausse. C'est inconfortable. C'est exactement pour ça que ça marche.`,
    `La réciprocité est l'arme sociale la plus puissante et la plus sous-utilisée.\n\nCialdini l'a prouvé : les gens remboursent toujours une dette sociale, même si le cadeau initial était non sollicité et de faible valeur. Le restaurant qui offre une menthe avec l'addition augmente le pourboire de 14%. Pas parce que la menthe vaut quelque chose — parce qu'elle crée une obligation psychologique.\n\nApplication cette semaine : rends un service concret et inattendu à quelqu'un que tu veux avoir dans ton camp. Ne demande rien en retour. Observe.`,
    `L'effet de halo déforme chaque jugement que tu portes sur queltrouver un.\n\nQuand on perçoit une qualité positive chez quelqu'un — une belle présence, un costume bien coupé, une poignée de main ferme — le cerveau extrapole : il suppose d'autres qualités positives. Les études montrent que les gens de grande taille sont perçus comme plus compétents, les personnes attirantes comme plus intelligentes. Ce biais structure chaque entretien d'embauche, chaque audience, chaque négociation.\n\nApplication cette semaine : soigne un détail de ton apparence ou de ta posture que tu négliges. Un seul. L'effet de halo fait le reste.`,

function loadStorage() {
  try {
    const s = JSON.parse(localStorage.getItem('ikigai_v3') || '{}');
    if (s.plans) state.plans = s.plans;
    if (s.conceptIdx) state.conceptIdx = s.conceptIdx;
    if (s.defiIdx) state.defiIdx = s.defiIdx;
    if (s.workoutLog) state.workoutLog = s.workoutLog;
  } catch {}
}
function saveStorage() {
  localStorage.setItem('ikigai_v3', JSON.stringify({ plans: state.plans, conceptIdx: state.conceptIdx, defiIdx: state.defiIdx, workoutLog: state.workoutLog }));
}
loadStorage();

// ── UTILS ─────────────────────────────────────────────────
function today() {
  return new Date().toISOString().slice(0,10);
}
function addDays(ds, n) {
  const d = new Date(ds + 'T12:00:00');
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0,10);
}
function fmtDate(ds) {
  return new Date(ds + 'T12:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function getPagesRead(plan) {
  return (plan.log||[]).reduce((a,b)=>a+b.pages,0);
}
function getDaysLeft(plan) {
  return Math.ceil((new Date(plan.endDate+'T12:00:00') - new Date()) / 86400000);
}
function getStreak(plan) {
  let streak=0, d=new Date();
  const dates = new Set((plan.log||[]).map(l=>l.date));
  while(true){ const ds=d.toISOString().slice(0,10); if(dates.has(ds)){streak++;d.setDate(d.getDate()-1);}else break; }
  return streak;
}
function buildPlan(f) {
  const m = METHODS[f.method];
  const pages = parseInt(f.pages)||200;
  const schedule = [];
  let remaining = pages, readCount = 0, cur = f.startDate;
  while(remaining > 0) {
    const isRev = m.reviewEvery > 0 && readCount > 0 && readCount % m.reviewEvery === 0;
    if(isRev) {
      schedule.push({date:cur,type:'review',pages:0});
    } else {
      const p = Math.min(m.ppd, remaining);
      schedule.push({date:cur,type:'read',pages:p});
      remaining -= p; readCount++;
    }
    cur = addDays(cur,1);
  }
  return {
    id: Date.now(),
    title: f.title, author: f.author,
    totalPages: pages, method: f.method,
    startDate: f.startDate,
    endDate: schedule.length ? schedule[schedule.length-1].date : f.startDate,
    schedule, log: [], status:'active'
  };
}

// ── NAVIGATE ──────────────────────────────────────────────
function navigate(screen) {
  state.screen = screen;
  if(screen === 'learn') { state.domain = null; state.tab = 'concept'; }
  if(screen === 'reading') { state.plannerView = 'list'; }
  if(screen === 'muscu') { state.muscu.selectedDay = null; }
  // Stop timer when leaving detail/session view
  if(screen !== 'reading' || state.plannerView !== 'detail') {
    timerPause();
    state.timer.seconds = 0;
  }
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-'+screen)?.classList.add('active');
  render();
}
function openDomain(id) {
  state.domain = DOMAINS.find(d=>d.id===id);
  state.tab = 'concept';
  if(state.conceptIdx[id] === undefined) state.conceptIdx[id] = 0;
  render();
}
function setTab(tab) {
  state.tab = tab;
  render();
}
function nextConcept() {
  const id = state.domain.id;
  const arr = CONCEPTS[id]||[];
  state.conceptIdx[id] = ((state.conceptIdx[id]||0)+1) % arr.length;
  saveStorage();
  render();
}
function nextDefi() {
  const id = state.domain.id;
  const arr = DEFIS[id]||[];
  state.defiIdx[id] = ((state.defiIdx[id]||0)+1) % arr.length;
  saveStorage();
  render();
}

  state.addForm.title = b.title;
  state.addForm.author = b.author;
  render();
}
function submitPlan() {
  if(!state.addForm.title||!state.addForm.pages) return;
  const plan = buildPlan(state.addForm);
  state.plans.push(plan);
  saveStorage();
  state.plannerView='list'; render();
}
function openPlan(id) {
  state.selectedPlan = state.plans.find(p=>p.id===id);
  state.plannerView='detail'; state.logPages=''; state.logDate=today();
  timerPause(); state.timer.seconds=0; state.timer.running=false;
  render();
}
function deletePlan(id) {
  if(!confirm('Supprimer ce plan ?')) return;
  state.plans = state.plans.filter(p=>p.id!==id);
  saveStorage(); state.plannerView='list'; render();
}
function logSession() {
  const p = parseInt(state.logPages);
  if(!p||p<=0||!state.selectedPlan) return;
  state.plans = state.plans.map(pl => {
    if(pl.id!==state.selectedPlan.id) return pl;
    const log = [...pl.log,{date:state.logDate,pages:p}];
    const total = log.reduce((a,b)=>a+b.pages,0);
    return {...pl, log, status: total>=pl.totalPages?'done':'active'};
  });
  state.selectedPlan = state.plans.find(p=>p.id===state.selectedPlan.id);
  state.logPages=''; saveStorage(); render();
}
function openCalendar() { state.plannerView='calendar'; render(); }
function backToDetail() { state.plannerView='detail'; render(); }

// ── MUSCU ACTIONS ─────────────────────────────────────────
function getTodayDayId() {
  const map = ['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
  return map[new Date().getDay()];
}
function openWorkoutDay(dayId) {
  const d = MUSCU_DAYS.find(x=>x.id===dayId);
  if(!d || d.rest) return;
  state.muscu.selectedDay = dayId;
  const existing = state.workoutLog.find(l=>l.date===today() && l.dayId===dayId);
  state.muscu.checked = existing ? {...existing.checked} : {};
  timerPause(); state.timer.seconds = 0; state.timer.running = false;
  render();
}
function backToMuscuWeek() {
  state.muscu.selectedDay = null;
  timerPause(); state.timer.seconds = 0; state.timer.running = false;
  render();
}
function toggleExercise(i) {
  state.muscu.checked[i] = !state.muscu.checked[i];
  render();
}
function finishSession() {
  const dayId = state.muscu.selectedDay;
  if(!dayId) return;
  const t = today();
  state.workoutLog = state.workoutLog.filter(l => !(l.date===t && l.dayId===dayId));
  state.workoutLog.push({ date:t, dayId, checked:{...state.muscu.checked} });
  saveStorage();
  backToMuscuWeek();
}
function getMuscuStreak() {
  let streak = 0;
  const d = new Date();
  const dates = new Set(state.workoutLog.map(l=>l.date));
  while(true) {
    const ds = d.toISOString().slice(0,10);
    if(dates.has(ds)) { streak++; }
    else if(d.getDay() !== 0) { break; } // dimanche = repos prévu, ne casse pas le streak
    d.setDate(d.getDate()-1);
  }
  return streak;
}
function getWeekSessionsCount() {
  const now = new Date();
  const diffToMonday = now.getDay()===0 ? 6 : now.getDay()-1;
  const monday = new Date(now);
  monday.setDate(now.getDate()-diffToMonday);
  const mondayStr = monday.toISOString().slice(0,10);
  return state.workoutLog.filter(l => l.date >= mondayStr).length;
}

// ── TIMER ─────────────────────────────────────────────────
function fmtTimer(s) {
  const h = Math.floor(s/3600);
  const m = Math.floor((s%3600)/60);
  const sec = s%60;
  return (h>0?String(h).padStart(2,'0')+':':'')+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
}
function timerStart() {
  if(state.timer.running) return;
  state.timer.running = true;
  state.timer.intervalId = setInterval(()=>{
    state.timer.seconds++;
    const el = document.getElementById('timer-display');
    if(el) el.textContent = fmtTimer(state.timer.seconds);
  }, 1000);
  const btn = document.getElementById('timer-toggle');
  if(btn) { btn.textContent='⏸ Pause'; btn.style.background='var(--border)'; btn.style.color='var(--ink)'; }
}
function timerPause() {
  if(!state.timer.running) return;
  state.timer.running = false;
  clearInterval(state.timer.intervalId);
  const btn = document.getElementById('timer-toggle');
  if(btn) { btn.textContent='▶ Reprendre'; btn.style.background='var(--blue)'; btn.style.color='#fff'; }
}
function timerToggle() {
  if(state.timer.running) timerPause(); else timerStart();
}
function timerReset() {
  timerPause();
  state.timer.seconds = 0;
  state.timer.running = false;
  const el = document.getElementById('timer-display');
  if(el) el.textContent = fmtTimer(0);
  const btn = document.getElementById('timer-toggle');
  if(btn) { btn.textContent='▶ Démarrer'; btn.style.background='var(--blue)'; btn.style.color='#fff'; }
}
function renderTimer() {
  const running = state.timer.running;
  return `
  <div class="timer-box">
    <div style="font-size:11px;color:var(--inkMid);letter-spacing:.1em;text-transform:uppercase;font-weight:600;margin-bottom:4px">⏱ Minuteur de session</div>
    <div class="timer-display" id="timer-display">${fmtTimer(state.timer.seconds)}</div>
    <div class="timer-btns">
      <button id="timer-toggle" class="timer-btn"
        style="background:${running?'var(--border)':'var(--blue)'};color:${running?'var(--ink)':'#fff'}"
        onclick="timerToggle()">${running?'⏸ Pause':'▶ Démarrer'}</button>
      <button class="timer-btn" style="background:var(--border);color:var(--inkMid)" onclick="timerReset()">↺ Reset</button>
    </div>
  </div>`;
}

    </div>

    ${['title','author','pages'].map(k=>`
    <div style="margin-bottom:16px">
      <div class="section-title">${k==='title'?'Titre du livre':k==='author'?'Auteur':'Nombre de pages'}</div>
      <input type="${k==='pages'?'number':'text'}" value="${esc(f[k])}"
        oninput="setField('${k}',this.value)"
        placeholder="${k==='title'?'Ex: Influence':k==='author'?'Ex: Robert Cialdini':'Ex: 320'}" style="width:100%">
    </div>`).join('')}

    <div style="margin-bottom:20px">
      <div class="section-title">Date de début</div>
      <input type="date" value="${f.startDate}" oninput="setField('startDate',this.value)" style="width:100%">
    </div>

    <div style="margin-bottom:28px">
      <div class="section-title">Méthode d'assimilation</div>
      ${Object.entries(METHODS).map(([k,m])=>`
      <div class="method-card ${f.method===k?'selected':''}" onclick="setMethod('${k}')">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span style="font-size:13px;font-weight:700;color:${f.method===k?'var(--blue)':'var(--ink)'}">${m.label}</span>
          <span style="font-size:11px;color:var(--inkMid)">${m.ppd} pages/jour</span>
        </div>
        <div style="font-size:12px;color:var(--inkMid);line-height:1.5">${m.desc}</div>
      </div>`).join('')}
    </div>

    ${preview}

    <button onclick="submitPlan()" ${!f.title||!f.pages?'disabled':''}
      style="width:100%;padding:15px;background:${f.title&&f.pages?'var(--blue)':'var(--border)'};border:none;border-radius:12px;color:${f.title&&f.pages?'#fff':'var(--inkDim)'};font-weight:700;font-size:15px;cursor:${f.title&&f.pages?'pointer':'not-allowed'};transition:all .2s;font-family:inherit">
      Créer le plan de lecture
    </button>

    <div style="margin-top:28px">
      <div class="section-title">Ajouter depuis la bibliothèque</div>
      ${allBooks.slice(0,8).map((b,i)=>{
        const d = DOMAINS.find(d=>d.id===b.did);
        return `<div onclick="selectBookFromLib(${i})"
          style="display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;cursor:pointer">
          <span style="font-size:14px;color:${d?.color}">${d?.icon}</span>
          <div style="flex:1">
            <div style="font-size:12px;color:var(--ink);font-weight:600">${esc(b.title)}</div>
            <div style="font-size:10px;color:var(--inkMid)">${esc(b.author)}</div>
          </div>
          <span style="font-size:11px;color:var(--blue)">↗</span>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function renderPlanDetail() {
  const plan = state.plans.find(p=>p.id===state.selectedPlan?.id)||state.selectedPlan;
  if(!plan) return renderPlanList();
  const pr = getPagesRead(plan);
  const pct = Math.min(100,Math.round(pr/plan.totalPages*100));
  const dl = getDaysLeft(plan);
  const streak = getStreak(plan);
  const t = today();
  const todaySlot = plan.schedule.find(s=>s.date===t);
  const done = plan.status==='done';
  const m = METHODS[plan.method];

  return `
  <div style="padding:20px 20px 100px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="back-btn" onclick="showList()">←</button>
        <div>
          <div style="font-size:15px;font-weight:800;color:var(--ink)">${esc(plan.title)}</div>
          <div style="font-size:11px;color:var(--inkMid)">${esc(plan.author)}</div>
        </div>
      </div>
      <button onclick="openCalendar()" style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--inkMid);font-size:11px;cursor:pointer;font-weight:600;font-family:inherit">📅 Calendrier</button>
    </div>

    <div class="kpi-grid">
      ${[
        {l:'Avancement',v:`${pct}%`,c:C.blue},
        {l:'Pages lues',v:pr,c:C.ink},
        {l:done?'Terminé !':`J-${Math.max(0,dl)}`,v:done?'✓':fmtDate(plan.endDate),c:done?C.green:C.gold},
        {l:'Streak',v:`${streak}j 🔥`,c:'#E87A4A'},
      ].map(k=>`
      <div class="kpi-box">
        <div class="kpi-val" style="color:${k.c}">${k.v}</div>
        <div class="kpi-label">${k.l}</div>
      </div>`).join('')}
    </div>

    <div class="progress-bar-wrap" style="height:8px;border-radius:4px;margin-bottom:8px">
      <div class="progress-bar" style="width:${pct}%;background:${done?C.green:C.blue};border-radius:4px"></div>
    </div>
    <div style="font-size:11px;color:var(--inkMid);margin-bottom:20px">${plan.totalPages-pr} pages restantes · ${m.label}</div>

    ${!done && todaySlot ? `
    <div class="today-target-box" style="background:${todaySlot.type==='review'?C.gold+'14':C.blue+'14'};border:1px solid ${todaySlot.type==='review'?C.gold+'44':C.blue+'44'}">
      <div style="font-size:11px;color:var(--inkMid);letter-spacing:.1em;text-transform:uppercase;font-weight:600;margin-bottom:6px">Objectif d'aujourd'hui</div>
      <div style="font-size:18px;font-weight:800;color:${todaySlot.type==='review'?C.gold:C.blue}">
        ${todaySlot.type==='review'?'🔄 Séance de révision':'📖 '+todaySlot.pages+' pages à lire'}
      </div>
      <div style="font-size:12px;color:var(--inkMid);margin-top:6px">
        ${todaySlot.type==='review'?'Reprends tes notes. Reformule les idées clés dans tes propres mots.':m.desc}
      </div>
    </div>` : ''}

    ${!done ? `
    ${renderTimer()}
    <div class="log-section">
      <div style="font-size:12px;color:var(--inkMid);letter-spacing:.1em;text-transform:uppercase;font-weight:600;margin-bottom:14px">Enregistrer une session</div>
      <div style="display:flex;gap:8px;margin-bottom:10px">
        <input type="number" value="${state.logPages}" oninput="state.logPages=this.value"
          placeholder="Pages lues" style="flex:1">
        <input type="date" value="${state.logDate}" oninput="state.logDate=this.value"
          style="background:var(--surface);border:1px solid var(--borderHi);border-radius:10px;padding:12px;color:var(--ink);font-size:13px;outline:none">
      </div>
      <button onclick="logSession()" ${!state.logPages?'disabled':''}
        style="width:100%;padding:12px;background:${state.logPages?'var(--blue)':'var(--border)'};border:none;border-radius:8px;color:${state.logPages?'#fff':'var(--inkDim)'};font-weight:700;font-size:13px;cursor:${state.logPages?'pointer':'not-allowed'};font-family:inherit">
        ✓ Valider la session
      </button>
    </div>` : ''}

    <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:20px">
      <div style="font-size:11px;color:var(--inkMid);letter-spacing:.1em;text-transform:uppercase;font-weight:600;margin-bottom:10px">Méthode : ${m.label}</div>
      <div style="font-size:13px;color:var(--inkMid);line-height:1.65">${m.desc}</div>
      <div style="margin-top:12px;display:flex;gap:16px">
        <div style="font-size:12px;color:var(--ink)">📖 <strong>${m.ppd}</strong> pages/jour</div>
        ${m.reviewEvery>0?`<div style="font-size:12px;color:var(--gold)">🔄 Révision tous les ${m.reviewEvery} jours</div>`:''}
      </div>
    </div>

    ${plan.log.length>0 ? `
    <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:20px">
      <div style="font-size:11px;color:var(--inkMid);letter-spacing:.1em;text-transform:uppercase;font-weight:600;margin-bottom:12px">Historique des sessions</div>
      ${[...plan.log].reverse().slice(0,7).map((l,i,arr)=>`
      <div style="display:flex;justify-content:space-between;padding:7px 0;${i<arr.length-1?'border-bottom:1px solid var(--border)':''}">
        <span style="font-size:12px;color:var(--inkMid)">${fmtDate(l.date)}</span>
        <span style="font-size:12px;color:var(--ink);font-weight:600">+${l.pages} pages</span>
      </div>`).join('')}
    </div>` : ''}

    <button onclick="deletePlan(${plan.id})" style="width:100%;padding:12px;background:none;border:1px solid ${C.red}44;border-radius:10px;color:var(--red);font-size:12px;cursor:pointer;opacity:.7;font-family:inherit">
      Supprimer ce plan
    </button>
  </div>`;
}

function renderCalendar() {
  const plan = state.plans.find(p=>p.id===state.selectedPlan?.id)||state.selectedPlan;
  if(!plan) return renderPlanList();
  const logDates = new Set(plan.log.map(l=>l.date));
  const t = today();
  const startDay = new Date(plan.startDate+'T12:00:00').getDay();
  const offset = startDay===0?6:startDay-1;

  return `
  <div style="padding:20px 20px 100px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px">
      <button class="back-btn" onclick="backToDetail()">←</button>
      <div>
        <div style="font-size:15px;font-weight:800;color:var(--ink)">Calendrier — ${esc(plan.title)}</div>
        <div style="font-size:11px;color:var(--inkMid)">${fmtDate(plan.startDate)} → ${fmtDate(plan.endDate)}</div>
      </div>
    </div>

    <div style="display:flex;gap:16px;margin-bottom:16px;flex-wrap:wrap">
      ${[{c:C.blue,l:'Lecture'},{c:C.gold,l:'Révision'},{c:C.green,l:'Fait'},{c:C.inkDim,l:'À venir'}].map(x=>`
      <div style="display:flex;align-items:center;gap:5px">
        <div style="width:10px;height:10px;border-radius:3px;background:${x.c}"></div>
        <span style="font-size:10px;color:var(--inkMid)">${x.l}</span>
      </div>`).join('')}
    </div>

    <div class="cal-grid">
      ${['L','M','M','J','V','S','D'].map(d=>`<div class="cal-day-label">${d}</div>`).join('')}
      ${Array.from({length:offset}).map(()=>'<div></div>').join('')}
      ${plan.schedule.map(slot=>{
        const isPast = slot.date < t;
        const isToday = slot.date === t;
        const isDone = logDates.has(slot.date) || (slot.type==='review' && isPast);
        const bg = isDone ? C.green : isToday ? (slot.type==='review'?C.gold:C.blue) : slot.type==='review' ? C.gold+'44' : isPast ? C.red+'44' : C.border;
        const day = new Date(slot.date+'T12:00:00').getDate();
        const borderStyle = isToday ? `border:2px solid ${slot.type==='review'?C.gold:C.blue}` : '';
        return `<div class="cal-cell" style="background:${bg};${borderStyle}" title="${fmtDate(slot.date)} — ${slot.type==='review'?'Révision':slot.pages+' pages'}">
          <span style="font-size:10px;color:${isDone||isToday?'#fff':'var(--inkMid)'};font-weight:${isToday?800:400}">${day}</span>
          ${slot.type==='review'?`<span style="font-size:7px;color:${isDone?'#fff':C.gold}">rev</span>`:''}
        </div>`;
      }).join('')}
    </div>

    <div style="margin-top:20px;font-size:12px;color:var(--inkMid);text-align:center">
      ${plan.schedule.filter(s=>logDates.has(s.date)).length} / ${plan.schedule.filter(s=>s.type==='read').length} séances complétées
    </div>
  </div>`;
}

// ── INIT ──────────────────────────────────────────────────
render();
</script>


</body></html>
